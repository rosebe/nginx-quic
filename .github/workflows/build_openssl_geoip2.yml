# This is a basic workflow to help you get started with Actions

name: build nginx-quic with Openssl , support ngx_http_geoip2_module 

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  #push:
    #branches:
      #- main
      #- b*
      #- E*
  #pull_request:
    #branches:
      #- main
      #- b*
      #- E* 
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  release:
    types: [published]
    
# Set time zone
env:
  TZ: Asia/Shanghai

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    #runs-on: ubuntu-24.04
    runs-on: ubuntu-latest
    
    if: github.event.repository.owner.id == github.event.sender.id
    
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6
                              
      # Runs a set of commands using the runners shell
      - name: depend
        run: |
          sudo apt-get update
          sudo apt-get upgrade
          sudo apt-get install build-essential ca-certificates \
                               zlib1g-dev libpcre3 libpcre3-dev libssl-dev \
                               git cmake ninja-build gnupg2 lsb-release libunwind-dev \
                               tar unzip  wget curl tree perl-base
          sudo add-apt-repository ppa:maxmind/ppa
          sudo apt install libmaxminddb0 libmaxminddb-dev mmdb-bin
          sudo apt-get install -y libtool automake autoconf wrk golang-go

      #- name: Setup Go environment
      #  uses: actions/setup-go@v4.0.1
      #  with:
      #   go-version: ^1.20
      #   check-latest: true
  
      - name: openssl
        run: |
          #git clone -b openssl-3.1.0+quic https://github.com/quictls/openssl.git
          #git clone -b openssl-3.1.0+quic+locks https://github.com/quictls/openssl.git
          #git clone https://github.com/openssl/openssl.git
          git clone --recurse-submodules -b openssl-3.6 --depth 1 https://github.com/openssl/openssl.git
          cd openssl
          git checkout .
          git pull
          git submodule update --init --recursive
          #mkdir build
          #cd build
          #../Configure
          #sudo make -j$(nproc --all)
          #sudo make install
          #sudo ldconfig /usr/local/lib64/
          #openssl version -d
          cd ..
                      
      - name: brotli
        run: |
          git clone --recurse-submodules -j8 https://github.com/google/ngx_brotli
          cd ngx_brotli/deps/brotli
          mkdir out && cd out
          cmake -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DCMAKE_C_FLAGS="-Ofast -m64 -march=native -mtune=native -flto -funroll-loops -ffunction-sections -fdata-sections -Wl,--gc-sections" -DCMAKE_CXX_FLAGS="-Ofast -m64 -march=native -mtune=native -flto -funroll-loops -ffunction-sections -fdata-sections -Wl,--gc-sections" -DCMAKE_INSTALL_PREFIX=./installed ..
          cmake --build . --config Release --target brotlienc
          cd ../../../..
          
      - name: zlib-cf
        run: |
          git clone -b gcc.amd64  https://github.com/cloudflare/zlib.git zlib-cf
          cd zlib-cf
          make -f Makefile.in distclean
          git checkout .
          git pull
          git submodule update --init --recursive
          cd ..
          
      - name: GeoLite2
        run: |
          git clone https://github.com/leev/ngx_http_geoip2_module.git
          cd ngx_http_geoip2_module
          git checkout .
          git pull
          cd ..
      
      - name: pcre2
        run: |
          git clone --recurse-submodules https://github.com/PCRE2Project/pcre2.git
          cd pcre2
          #git checkout .
          #git pull
          ./autogen.sh
          cd ..

      #- name: Set up GCC
        #uses: egor-tensin/setup-gcc@v1.3
        #with:
         #version: 12
         #platform: x64
         
                         
      # --- 第一阶段：插桩编译 (Instrument Build) ---
      - name: Stage 1 - Instrument Build
        run: |
          
          git clone https://github.com/nginx/nginx.git
          cd nginx
         
          echo "Commit_ID=$(git rev-parse --short HEAD) " >> $GITHUB_ENV
          
          curl https://raw.githubusercontent.com/rosebe/nginx-quic/refs/heads/master/nginx_dynamic_tls_records.patch | patch --verbose -p 1
          
          ./auto/configure \
            --with-compat \
            --with-file-aio \
            --with-threads \
            --with-http_addition_module \
            --with-http_auth_request_module \
            --with-http_dav_module \
            --with-http_flv_module \
            --with-http_gunzip_module \
            --with-http_gzip_static_module \
            --with-http_mp4_module \
            --with-http_random_index_module \
            --with-http_realip_module \
            --with-http_secure_link_module \
            --with-http_slice_module \
            --with-http_ssl_module \
            --with-http_stub_status_module \
            --with-http_sub_module \
            --with-http_v2_module \
            --with-mail \
            --with-mail_ssl_module \
            --with-stream \
            --with-stream_realip_module \
            --with-stream_ssl_module \
            --with-stream_ssl_preread_module \
            --add-module=../ngx_brotli \
            --with-pcre=../pcre2 \
            --with-pcre-jit \
            --with-zlib=../zlib-cf \
            --with-http_v3_module \
            --add-module=../ngx_http_geoip2_module \
            --with-openssl=../openssl  \
            --with-openssl-opt='enable-ktls no-comp no-shared enable-tls1_3' \
            --build="Commit ID: $(git rev-parse --short HEAD). Rosebe Add patch: Dynamic TLS Record support. And build on $(date +%Y_%m_%d-%H:%M:%S)" \
            --with-cc-opt='-static -static-libgcc -Ofast -march=x86-64-v3 -flto=auto -fprofile-generate=/tmp/pgo-data' \
            --with-ld-opt='-static -flto=auto -fprofile-generate=/tmp/pgo-data' \
            
          
          make -j$(nproc)
          cd ..

      - name: Stage 2 - Full Scenario Training (PGO)
        run: |
          # 1. [基础环境与路径准备]
          mkdir -p /tmp/pgo-run/proto /tmp/pgo-run/geoip /tmp/pgo-run/logs /tmp/pgo-run/client_body_temp /tmp/pgo-data
          chmod -R 777 /tmp/pgo-run /tmp/pgo-data

          # 2. [下载依赖资源]
          G_ROOT="github.com"
          G_PATH="/bojand/ghz/cmd/ghz@latest"
          GHZ_CMD="${G_ROOT}${G_PATH}"
          PROTO_URL="https://raw.githubusercontent.com"
          GEO_BASE="https://github.com"

          sudo apt-get update && sudo apt-get install -y wrk openssl brotli
          GO111MODULE=on go install "$GHZ_CMD"
          export PATH=$PATH:$(go env GOPATH)/bin

          echo "正在追踪 GeoIP 最新版本..."
          LATEST_TAG=$(curl -sSI "${GEO_BASE}/releases/latest" | grep -i "^location:" | awk -F'/' '{print $NF}' | tr -d '\r' | xargs)
          curl -L -sSL "${GEO_BASE}/releases/download/${LATEST_TAG}/GeoLite2-Country.mmdb" -o /tmp/pgo-run/geoip/GeoLite2-Country.mmdb
          curl -L -sSL "${GEO_BASE}/releases/download/${LATEST_TAG}/GeoLite2-City.mmdb" -o /tmp/pgo-run/geoip/GeoLite2-City.mmdb
          curl -sSL "$PROTO_URL" -o /tmp/pgo-run/proto/helloworld.proto

          # 3. [生成训练配置]
          # 注意：EOF 标记必须有缩进以符合 YAML，但 EOF 自身后面严禁有空格
          cat <<'EOF' > /tmp/pgo-run/pgo.conf
          worker_processes auto;
          daemon off;
          error_log /tmp/pgo-run/logs/error.log;
          pid /tmp/pgo-run/nginx.pid;
          events { worker_connections 2048; }
          stream {
              map $ssl_preread_server_name $backend {
                  example.com  127.0.0.1:8081; 
                  default      127.0.0.1:8082; 
              }
              server { listen 8443; proxy_pass $backend; ssl_preread on; }
          }
          http {
              client_body_temp_path /tmp/pgo-run/client_body_temp;
              proxy_temp_path       /tmp/pgo-run/proxy_temp;
              fastcgi_temp_path     /tmp/pgo-run/fastcgi_temp;
              uwsgi_temp_path       /tmp/pgo-run/uwsgi_temp;
              scgi_temp_path        /tmp/pgo-run/scgi_temp;
              geoip2 /tmp/pgo-run/geoip/GeoLite2-Country.mmdb { $geoip2_data_country_code country iso_code; }
              geoip2 /tmp/pgo-run/geoip/GeoLite2-City.mmdb { $geoip2_data_city_name city names en; }
              map $http_upgrade $connection_upgrade { default upgrade; '' close; }
              server {
                  listen 8081;
                  add_header X-IP-Country $geoip2_data_country_code;
                  add_header X-IP-City $geoip2_data_city_name;
                  location /ws { return 200 "ws_ok"; }
                  location /grpc { return 200 "grpc_ok"; }
                  location / { return 200 "PGO training content"; }
              }
          }
          EOF

          # 4. [插桩启动与生存检查]
          # 使用 -p 强制指定前缀，切断对 /usr/local/nginx 的依赖
          $(pwd)/nginx/objs/nginx -p /tmp/pgo-run -c /tmp/pgo-run/pgo.conf > /tmp/pgo-run/logs/stdout.log 2>&1 &
          NGINX_PID=$!

          sleep 5
          if ! kill -0 $NGINX_PID 2>/dev/null; then
              echo "❌ Nginx 启动失败！诊断日志："
              [ -f /tmp/pgo-run/logs/error.log ] && cat /tmp/pgo-run/logs/error.log
              cat /tmp/pgo-run/logs/stdout.log
              exit 1
          fi

          # 5. [全场景压测训练]
          echo ">> Step 1: SNI/Stream..."
          for i in {1..20}; do echo "QUIT" | openssl s_client -connect 127.0.0.1:8443 -servername example.com >/dev/null 2>&1; done
          
          echo ">> Step 2: WebSocket & GeoIP..."
          wrk -t2 -c50 -d5s -H "Upgrade: websocket" -H "Connection: Upgrade" http://127.0.0.1
          
          echo ">> Step 3: gRPC..."
          ghz --insecure --proto=/tmp/pgo-run/proto/helloworld.proto --call=helloworld.Greeter.SayHello -n 500 127.0.0.1:8081/grpc || true
          
          echo ">> Step 4: High Load..."
          wrk -t4 -c100 -d5s http://127.0.0.1:8081

          # 6. [优雅退出写出数据]
          echo ">> 正在写出 PGO Profile 数据..."
          kill -QUIT $NGINX_PID
          sleep 5
          
          # 最终检查是否有 .gcda 文件生成
          echo ">> PGO 数据检查结果："
          ls -R /tmp/pgo-data || echo "⚠️ 未发现训练数据！"


      # --- 第三阶段：最终极致编译 (Final Optimization) ---
      - name: Stage 3 - Final Build
        run: |
          cd nginx
          make clean
          ./auto/configure \
            --prefix=/etc/nginx \
            --sbin-path=/usr/sbin/nginx \
            --modules-path=/usr/lib64/nginx/modules \
            --conf-path=/etc/nginx/nginx.conf \
            --error-log-path=/var/log/nginx/error.log \
            --http-log-path=/var/log/nginx/access.log \
            --pid-path=/var/run/nginx.pid \
            --lock-path=/var/run/nginx.lock \
            --http-client-body-temp-path=/var/cache/nginx/client_temp \
            --http-proxy-temp-path=/var/cache/nginx/proxy_temp \
            --http-fastcgi-temp-path=/var/cache/nginx/fastcgi_temp \
            --http-uwsgi-temp-path=/var/cache/nginx/uwsgi_temp \
            --http-scgi-temp-path=/var/cache/nginx/scgi_temp \
            --user=nginx \
            --group=nginx \
            --with-compat \
            --with-file-aio \
            --with-threads \
            --with-http_addition_module \
            --with-http_auth_request_module \
            --with-http_dav_module \
            --with-http_flv_module \
            --with-http_gunzip_module \
            --with-http_gzip_static_module \
            --with-http_mp4_module \
            --with-http_random_index_module \
            --with-http_realip_module \
            --with-http_secure_link_module \
            --with-http_slice_module \
            --with-http_ssl_module \
            --with-http_stub_status_module \
            --with-http_sub_module \
            --with-http_v2_module \
            --with-mail \
            --with-mail_ssl_module \
            --with-stream \
            --with-stream_realip_module \
            --with-stream_ssl_module \
            --with-stream_ssl_preread_module \
            --add-module=../ngx_brotli \
            --with-pcre=../pcre2 \
            --with-pcre-jit \
            --with-zlib=../zlib-cf \
            --with-http_v3_module \
            --add-module=../ngx_http_geoip2_module \
            --with-openssl=../openssl  \
            --with-openssl-opt='enable-ktls no-comp no-shared enable-tls1_3' \
            --build="Commit ID: $(git rev-parse --short HEAD). Rosebe Add patch: Dynamic TLS Record support. And build on $(date +%Y_%m_%d-%H:%M:%S)" \
            --with-cc-opt='-static -static-libgcc -Ofast -march=x86-64-v4 -flto=auto -fprofile-use=/tmp/pgo-data -fprofile-correction' \
            --with-ld-opt='-static -flto=auto -fprofile-use=/tmp/pgo-data' 
            
          
          make -j$(nproc)
          
          # 在 Stage 3 结尾添加
          ls -lh objs/nginx
          file objs/nginx     # 确认是否为 statically linked
          ldd objs/nginx || true  # 确认是否报 'not a dynamic executable' (代表静态链接成功)
          
      - uses: actions/upload-artifact@v6
        with:
          name: nginx-quic.Openssl
          path: /home/runner/work/nginx-quic/nginx-quic/nginx/objs/nginx
      
        # Setting an environment variable
        # https://docs.github.com/en/actions/reference/workflow-commands-for-github-actions
      - name: Set variables
        id: step_one
        shell: bash
        run: |
          echo "ASSET_NAME=nginx-quic-static v$(grep "#define NGINX_VERSION" /home/runner/work/nginx-quic/nginx-quic/nginx/src/core/nginx.h | awk '{print $3}' | tr -d '"') ${{ env.Commit_ID }} Enable_OpenSSL and support ngx_http_geoip2_module build on $(date +%Y_%m_%d-%H:%M:%S)" >> $GITHUB_ENV
          echo "TAG_NAME=v$(grep "#define NGINX_VERSION" /home/runner/work/nginx-quic/nginx-quic/nginx/src/core/nginx.h | awk '{print $3}' | tr -d '"')" >> $GITHUB_ENV
          echo "RELEASE_NAME=nginx-quic" v$(grep "#define NGINX_VERSION" /home/runner/work/nginx-quic/nginx-quic/nginx/src/core/nginx.h | awk '{print $3}' | tr -d '"')>> $GITHUB_ENV
          
          echo "TAG_NAME: "
          echo "${{ env.TAG_NAME }}"
          echo ""
          echo "RELEASE_NAME: "
          echo "${{ env.RELEASE_NAME }}"
          echo ""
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}, RELEASE_NAME: $(GITHUB_RELEASE_NAME) , TAG_NAME: ${GITHUB_TAG_NAME}"
          echo ""
          echo "RELEASE_NAME: ${{ env.RELEASE_NAME }} "
          echo "TAG_NAME: ${{ env.TAG_NAME }} "
          echo ""
          echo "TAG_NAME 1: ${{ env.TAG_NAME }} "
          echo "TAG_NAME 2: $env.TAG_NAME "
          echo "TAG_NAME 3: $TAG_NAME "
          echo "TAG_NAME 4:" $TAG_NAME
          echo "TAG_NAME 5: ""${{ env.TAG_NAME }} "
          echo ""
          echo "RELEASE_NAME 5: "
          echo "${{ env.RELEASE_NAME }}"
          echo ""
          echo "GITHUB_WORKFLOW is:" $GITHUB_WORKFLOW
          echo "GITHUB_ENV 1: "$GITHUB_ENV
          echo "GITHUB_ENV 2: ${GITHUB_ENV} "       
              
      - name: Use variables
        id: step_two
        shell: bash
        run: |
          echo "TAG_NAME: "
          echo "${{ env.TAG_NAME }}"
          echo ""
          echo "RELEASE_NAME: "
          echo "${{ env.RELEASE_NAME }}"
          echo ""
          echo "ASSET_NAME: "
          echo "${{ env.ASSET_NAME }}" 
          echo "GITHUB_WORKSPACE: ${GITHUB_WORKSPACE}, RELEASE_NAME: $(GITHUB_RELEASE_NAME) , TAG_NAME: ${GITHUB_TAG_NAME}"
          echo ""
          echo "RELEASE_NAME: ${{ env.RELEASE_NAME }} "
          echo "TAG_NAME: ${{ env.TAG_NAME }} "
          echo "ASSET_NAME: ${{ env.ASSET_NAME }} "
          echo ""
          echo "TAG_NAME 1: ${{ env.TAG_NAME }} "
          echo "TAG_NAME 2: $env.TAG_NAME "
          echo "TAG_NAME 3: $TAG_NAME "
          echo "TAG_NAME 4:" $TAG_NAME
          echo "TAG_NAME 5: ""${{ env.TAG_NAME }} "
          echo ""
          echo "RELEASE_NAME 5: "
          echo "${{ env.RELEASE_NAME }}"
          echo "GITHUB_WORKFLOW is:" $GITHUB_WORKFLOW
          echo ""
          echo "GITHUB_ENV 1: "$GITHUB_ENV
          echo "GITHUB_ENV 2: ${GITHUB_ENV} "
          
          echo "$(tree -d)"
          
      - name: Upload binaries to release
        #uses: svenstaro/upload-release-action@1b2bf5c959aebf44ffded0b72f8bdc5737400da1
        uses: svenstaro/upload-release-action@2.11.2
        #if: github.event_name == 'release'
        with:
          repo_token: ${{ github.token }}          
          tag: ${{ env.TAG_NAME }}
          release_name: ${{ env.RELEASE_NAME }}
          asset_name: ${{ env.ASSET_NAME }}
          file: /home/runner/work/nginx-quic/nginx-quic/nginx/objs/nginx
          body: "Happy play "
          overwrite: true
          file_glob: false
